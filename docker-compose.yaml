version: '3.8'

services:
  mongo:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db

  product_service:
    build:
      context: product-service
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URL=mongodb://mongo:27017/marketplace
    depends_on:
      - mongo

  frontend:
    build:
      context: frontend
    ports:
      - "5002:4173"
    environment:
      - VITE_API_URL=http://localhost:3000
  bidding_service:
    build:
      context: bidding-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGO_URL=mongodb://mongo:27017/marketplace
      - GATEWAY_URL=http://gateway_service:3002/events
    depends_on:
      - mongo
  gateway_service:
    build:
      context: gateway-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002

volumes:
  mongo-data:

